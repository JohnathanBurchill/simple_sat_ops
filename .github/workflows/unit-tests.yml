# Build and run the simple_sat_ops unit-test (*_selftest) suite on every
# push / PR.
#
# sgp4sdp4 is vendored under sgp4sdp4/ and built as part of the main
# CMake project via add_subdirectory — no separate install step needed.
#
# Only the dependencies the selftests actually need are installed:
#   build-essential cmake pkg-config   -> toolchain + CMake
#   libssl-dev                         -> ax100/tx_burst/packet_db (libcrypto)
#   libsqlite3-dev                     -> packet_db
#   libncurses-dev                     -> prediction_selftest (header only)
#
# Deliberately NOT installed (not needed to build/run the selftests, and
# they make CI slow / can be flaky on hosted runners):
#   libuhd-dev (UHD), librtlsdr-dev, libusb-1.0-0-dev, libasound2-dev (ALSA),
#   libsndfile1-dev, libraylib-dev
# The SDR/voice backends are turned OFF via -DWITH_USRP_B210=OFF
# -DWITH_RTL_SDR=OFF -DWITH_HAM_VOICE=OFF so the configure step never
# probes for them.

name: unit-tests

on:
  push:
  pull_request:
  workflow_dispatch: {}

# A newer push to the same branch/PR cancels an in-flight run.
concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies (minimal selftest set)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libssl-dev libsqlite3-dev libncurses-dev

      - name: Configure
        run: |
          cmake -S . -B build \
            -DWITH_USRP_B210=OFF \
            -DWITH_RTL_SDR=OFF \
            -DWITH_HAM_VOICE=OFF \
            -DCMAKE_BUILD_TYPE=Debug

      # `selftests` is an aggregate target defined at the end of
      # CMakeLists.txt that depends on every registered *_selftest. Building
      # it (rather than naming each test here) means a newly added selftest
      # is exercised by CI with no change to this workflow. It also skips the
      # full UI / utils, which would pull in ncurses link + more time.
      - name: Build selftests
        run: cmake --build build --parallel --target selftests

      # enable_testing()/add_test() are wired in CMakeLists.txt, so ctest
      # discovers every built selftest and fails the job on any non-zero
      # exit. --no-tests=error guards against a misconfigure that registers
      # nothing (which would otherwise pass vacuously).
      - name: Run selftests (ctest)
        run: ctest --test-dir build --output-on-failure --no-tests=error
