# Build the bundled sgp4sdp4 library, then build and run the
# simple_sat_ops unit-test (*_selftest) suite on every push / PR.
#
# Only the dependencies the selftests actually need are installed:
#   build-essential cmake pkg-config   -> toolchain + CMake
#   libssl-dev                         -> ax100/tx_burst/packet_db (libcrypto)
#   libsqlite3-dev                     -> packet_db
#   libncurses-dev                     -> prediction_selftest (header only)
# sgp4sdp4 headers (installed below)   -> prediction + ipc_fill + packet_db
#                                         (they #include <sgp4sdp4.h> via ephemeres.h)
#
# Deliberately NOT installed (not needed to build/run the selftests, and
# they make CI slow / can be flaky on hosted runners):
#   libuhd-dev (UHD), librtlsdr-dev, libusb-1.0-0-dev, libasound2-dev (ALSA),
#   libsndfile1-dev, libraylib-dev
# The SDR/voice backends are turned OFF via -DWITH_USRP_B210=OFF
# -DWITH_RTL_SDR=OFF -DWITH_HAM_VOICE=OFF so the configure step never
# probes for them.

name: unit-tests

on:
  push:
    branches: [any-sdr, main]
  pull_request:
    branches: [any-sdr, main]
  workflow_dispatch: {}

# A newer push to the same branch/PR cancels an in-flight run.
concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies (minimal selftest set)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libssl-dev libsqlite3-dev libncurses-dev

      # The bundled sgp4sdp4/ is a SEPARATE CMake project with no install()
      # rule. The main build finds it via find_library(SGP4SDP4_LIB sgp4sdp4)
      # + #include <sgp4sdp4.h>, both of which resolve against /usr/local on
      # a default GCC. So: build the static lib, then drop the .a + .h into
      # /usr/local/{lib,include}. This is the same end state as a manual
      # build+install on the dev/ground machines.
      #
      # Cache key is the sha256 of every file under sgp4sdp4/, so the lib is
      # only rebuilt when those sources change (it is a ~40 KB static lib;
      # the build is a few seconds, but caching keeps the step near-instant).
      - name: Cache built sgp4sdp4
        id: cache-sgp4sdp4
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/libsgp4sdp4.a
            /usr/local/include/sgp4sdp4.h
          key: sgp4sdp4-${{ runner.os }}-${{ hashFiles('sgp4sdp4/**') }}

      - name: Build and install sgp4sdp4
        if: steps.cache-sgp4sdp4.outputs.cache-hit != 'true'
        run: |
          cmake -S sgp4sdp4 -B sgp4sdp4/build -DCMAKE_BUILD_TYPE=Release
          cmake --build sgp4sdp4/build --parallel
          sudo install -m 0644 sgp4sdp4/build/libsgp4sdp4.a /usr/local/lib/libsgp4sdp4.a
          sudo install -m 0644 sgp4sdp4/sgp4sdp4.h          /usr/local/include/sgp4sdp4.h
          sudo ldconfig || true

      - name: Configure
        run: |
          cmake -S . -B build \
            -DWITH_USRP_B210=OFF \
            -DWITH_RTL_SDR=OFF \
            -DWITH_HAM_VOICE=OFF \
            -DCMAKE_BUILD_TYPE=Debug

      # `selftests` is an aggregate target defined at the end of
      # CMakeLists.txt that depends on every registered *_selftest. Building
      # it (rather than naming each test here) means a newly added selftest
      # is exercised by CI with no change to this workflow. It also skips the
      # full UI / utils, which would pull in ncurses link + more time.
      - name: Build selftests
        run: cmake --build build --parallel --target selftests

      # enable_testing()/add_test() are wired in CMakeLists.txt, so ctest
      # discovers every built selftest and fails the job on any non-zero
      # exit. --no-tests=error guards against a misconfigure that registers
      # nothing (which would otherwise pass vacuously).
      - name: Run selftests (ctest)
        run: ctest --test-dir build --output-on-failure --no-tests=error
