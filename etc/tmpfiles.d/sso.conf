# /etc/tmpfiles.d/sso.conf
#
# Recreate the sso runtime + log directories on every boot. /run/sso
# is tmpfs and vanishes between reboots, so without this file the
# operator-mode tools fall back to ${XDG_RUNTIME_DIR}/sso (per-user,
# not shared) and viewers can't reach the operator's socket.
#
# Install with:
#   sudo install -m 0644 etc/tmpfiles.d/sso.conf /etc/tmpfiles.d/
#   sudo systemd-tmpfiles --create /etc/tmpfiles.d/sso.conf

# Type Path           Mode Owner Group   Age  Argument
d       /run/sso       2770 root  sso-ops -    -
d       /var/log/sso   2770 root  sso-ops -    -
